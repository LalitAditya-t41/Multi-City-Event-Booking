spring:
  application:
    name: app
  datasource:
    url: jdbc:h2:mem:eventplatform;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

app:
  default-org-id: 1

eventbrite:
  webhook:
    secret: local-dev-secret
    endpoint-url: http://localhost:8080/admin/v1/webhooks/eventbrite

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
