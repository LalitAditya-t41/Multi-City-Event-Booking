spring:
  application:
    name: app
  datasource:
    url: jdbc:postgresql://localhost:5432/eventplatform
    driver-class-name: org.postgresql.Driver
    username: eventplatform
    password: eventplatform
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

app:
  default-org-id: 1
  internal-base-url: http://localhost:8080

eventbrite:
  base-url: http://localhost:8888
  api-key: ${EVENTBRITE_API_KEY:mock-token}
  oauth:
    client-id: local-client-id
    redirect-uri: http://localhost:8080/api/v1/admin/orgs/1/eventbrite/callback
    encryption-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  retry:
    max-attempts: 3
    initial-backoff-ms: 250
    max-backoff-ms: 5000
  webhook:
    secret: local-dev-secret
    endpoint-url: http://localhost:8080/admin/v1/webhooks/eventbrite

scheduling:
  turnaround-gap-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
